{% extends "core/base.html" %}

{% block title %}Удаление товара{% endblock %}

{% block content %}
<h1>Удаление товара</h1>

<p>Удалить товар "{{ object.name }}"?</p>
<p>Если товар есть в заказе, удаление будет запрещено.</p>

<form method="post">
    {% csrf_token %}
    <button class="danger" type="submit">Удалить</button>
    <a class="button" href="{% url 'product_list' %}">Отмена</a>
</form>
{% endblock %}
